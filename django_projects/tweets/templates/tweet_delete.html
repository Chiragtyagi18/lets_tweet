{% extends "layout.html" %}
{% block title %}Delete Tweet - TweetApp{% endblock %}
{% block content %}
<div class="delete-card">
    <h1><i class="bi bi-exclamation-triangle" style="color:var(--d)"></i> Delete Tweet</h1>
    <p>Are you sure you want to delete this tweet? This action cannot be undone.</p>
    <div class="tweet-preview">
        <div class="text">{{ tweet.text }}</div>
        <div class="user">by {{ tweet.user.username }}</div>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="action-buttons">
            <button class="btn btn-danger-custom" type="submit"><i class="bi bi-trash"></i> Yes, delete it</button>
            <a href="{% url 'tweet_list' %}" class="btn btn-outline-custom"><i class="bi bi-x-lg"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
