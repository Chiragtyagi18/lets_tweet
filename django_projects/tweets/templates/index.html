{% extends 'layout.html' %}
{% block title %}TweetApp{% endblock %}
{% block content %}
<div class="hero-section">
    <h1>Welcome to TweetApp</h1>
    <p>A place to share your thoughts and connect with others.</p>
    {% if user.is_authenticated %}
    <a href="{% url 'tweet_create' %}" class="btn btn-primary-custom mt-3"><i class="bi bi-plus-circle"></i> Create Tweet</a>
    {% else %}
    <a href="{% url 'login' %}" class="btn btn-primary-custom mt-3"><i class="bi bi-box-arrow-in-right"></i> Get Started</a>
    {% endif %}
</div>
{% endblock %}
