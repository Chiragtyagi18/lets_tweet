{% extends "layout.html" %}
{% block title %}Logged Out - TweetApp{% endblock %}
{% block content %}
<div class="auth-card">
    <div class="auth-icon"><i class="bi bi-box-arrow-right"></i></div>
    <h1>Logged Out</h1>
    <p class="auth-subtitle">You have been successfully logged out.</p>
    <a href="{% url 'login' %}" class="btn btn-primary-custom mt-2"><i class="bi bi-box-arrow-in-right"></i> Login Again</a>
</div>
{% endblock %}
