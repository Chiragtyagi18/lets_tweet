{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TweetApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'tweet_list' %}"><i class="bi bi-twitter-x"></i> TweetApp</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'tweet_list' %}"><i class="bi bi-house-door"></i> Home</a>
        </li>
        {% if user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'tweet_create' %}"><i class="bi bi-plus-circle"></i> New Tweet</a>
        </li>
        {% endif %}
      </ul>
      <form class="d-flex search-form" role="search" action="{% url 'search_tweets' %}" method="GET">
        <i class="bi bi-search search-icon"></i>
        <input class="form-control me-2" type="search" name="q" placeholder="Search tweets, users..." aria-label="Search" value="{{ query|default:'' }}">
        <button class="btn-search" type="submit"><i class="bi bi-search" style="font-size:0.8rem"></i></button>
      </form>
      {% if user.is_authenticated %}
        <span class="navbar-text text-white mx-2 d-none d-md-inline">
            <i class="bi bi-person-circle"></i> {{ user.username }}
        </span>
        <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-custom ms-2"><i class="bi bi-box-arrow-right"></i> Logout</button>
          </form>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-outline-custom ms-2"><i class="bi bi-box-arrow-in-right"></i> Login</a>
        <a href="{% url 'register' %}" class="btn btn-primary-custom ms-2"><i class="bi bi-person-plus"></i> Register</a>
      {% endif %}
    </div>
  </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
